<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>留学生労働時間チェック</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: sans-serif; padding:20px; }
button { padding:10px; margin-top:10px; width:100%; }
input { padding:10px; width:100%; margin-top:10px; }
table { border-collapse: collapse; width:100%; margin-top:20px; }
th, td { border:1px solid #ccc; padding:8px; }
.notice { color:red; margin-top:10px; }
</style>
</head>

<body>

<h2>留学生労働時間チェック</h2>

<input type="file" id="csvFile" accept=".csv">

<div class="notice">
現在、1名のみ表示中です。有料版で全従業員表示できます。
</div>

<input type="password" id="pw" placeholder="有料版パスワード">
<button onclick="unlockPro()">有料版を解除</button>

<table id="resultTable"></table>

<script>

let isPaid = false;
let allData = [];

function unlockPro() {
    const input = document.getElementById("pw").value;
    if(input === "pro2026") {
        isPaid = true;
        alert("有料版が有効になりました");
        renderTable();
    } else {
        alert("パスワードが違います");
    }
}

document.getElementById("csvFile").addEventListener("change", function(event) {

    const file = event.target.files[0];

    Papa.parse(file, {
        complete: function(results) {

            const data = results.data;

            if(data.length < 2) {
                alert("データがありません");
                return;
            }

            allData = data;
            renderTable();
        }
    });

});

function renderTable() {

    if(allData.length === 0) return;

    const header = allData[0];
    const rows = allData.slice(1);

    const table = document.getElementById("resultTable");
    table.innerHTML = "";

    let headerRow = "<tr>";
    header.forEach(h => headerRow += "<th>" + h + "</th>");
    headerRow += "</tr>";

    let dataRows = "";

    if(isPaid) {
        rows.forEach(row => {
            dataRows += "<tr>";
            row.forEach(d => dataRows += "<td>" + d + "</td>");
            dataRows += "</tr>";
        });
    } else {
        const firstRow = rows[0];
        dataRows += "<tr>";
        firstRow.forEach(d => dataRows += "<td>" + d + "</td>");
        dataRows += "</tr>";
    }

    table.innerHTML = headerRow + dataRows;
}

</script>

</body>
</html>
