<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>シフト確認ツール</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: sans-serif; padding:20px; }
button { padding:10px; margin-top:10px; width:100%; }
table { border-collapse: collapse; width:100%; margin-top:20px; }
th, td { border:1px solid #ccc; padding:8px; text-align:left; }
.notice { color:red; margin-top:10px; }
</style>
</head>

<body>

<h2>留学生労働時間チェック</h2>

<input type="file" id="csvFile" accept=".csv">

<div class="notice">
現在、1名のみ表示中です。有料版で全従業員表示できます。
</div>

<table id="resultTable"></table>

<script>

document.getElementById("csvFile").addEventListener("change", function(event) {

    const file = event.target.files[0];

    Papa.parse(file, {
        complete: function(results) {

            const data = results.data;

            if(data.length < 2) {
                alert("データがありません");
                return;
            }

            const header = data[0];
            const rows = data.slice(1);

            // 1名だけ表示（無料制限）
            const firstRow = rows[0];

            const table = document.getElementById("resultTable");
            table.innerHTML = "";

            let headerRow = "<tr>";
            header.forEach(h => headerRow += "<th>" + h + "</th>");
            headerRow += "</tr>";

            let dataRow = "<tr>";
            firstRow.forEach(d => dataRow += "<td>" + d + "</td>");
            dataRow += "</tr>";

            table.innerHTML = headerRow + dataRow;
        }
    });

});

</script>

</body>
</html>
